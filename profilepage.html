<!doctype html>
<html lang="en">
  <head>
    <title>Guidebook Vancouver</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/main.js"></script>
    <script type="module" src="./src/components/sitenavbar.js"></script>
    <script type="module" src="./src/components/sitefooter.js"></script>
    <script type="module" src="./src/profilepage.js"></script>
  </head>

  <body class="bg-gray-100">
    <site-navbar></site-navbar>

    <main
      class="min-h-screen flex items-center justify-center px-4 pt-28 pb-24"
    >
      <div
        class="w-full max-w-md bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200"
      >
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-gray-800">User Profile</h1>
          <p class="text-gray-500 text-sm mt-1">
            Update your profile details and photo
          </p>
        </div>

        <div class="flex flex-col items-center mb-6">
          <img
            id="profileImage"
            src="/images/hike2.jpg"
            alt="Profile Picture"
            class="w-24 h-24 rounded-full object-cover border-4 border-teal-100 shadow mb-3"
          />

          <label class="text-sm font-medium text-gray-700 mb-2"
            >Profile Picture</label
          >

          <input
            type="file"
            id="inputImage"
            accept="image/*"
            class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-teal-500 file:text-white file:font-semibold hover:file:bg-teal-600"
          />
        </div>

        <form>
          <fieldset id="personalInfoFields" disabled class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Name</label
              >
              <input
                type="text"
                id="nameInput"
                class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >School</label
              >
              <input
                type="text"
                id="schoolInput"
                class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >City</label
              >
              <input
                type="text"
                id="cityInput"
                class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              />
            </div>
          </fieldset>

          <div class="mt-6 flex justify-center gap-3">
            <button
              class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg font-medium transition"
              id="editButton"
              type="button"
            >
              Edit
            </button>

            <button
              class="bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg font-medium transition"
              id="saveButton"
              type="button"
            >
              Save
            </button>
          </div>

          <div class="flex justify-center pt-4">
            <a
              class="bg-[#00C7A9] hover:bg-[#00b39a] px-5 py-2 rounded-lg text-white font-semibold transition shadow-sm"
              href="edititinerary.html"
            >
              See Your Planner
            </a>
          </div>
        </form>
      </div>
    </main>

    <site-footer></site-footer>
  </body>
</html>
