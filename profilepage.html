<!doctype html>
<html lang="en">
  <head>
    <title>Guidebook Vancouver</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <script type="module" src="./src/main.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/main.js"></script>
    <script type="module" src="./src/components/sitenavbar.js"></script>
    <script type="module" src="./src/components/sitefooter.js"></script>
    <script type="module" src="./src/profilepage.js"></script>
  </head>

  <body>
    <!-- NAVBAR STARTS HERE -->
    <site-navbar></site-navbar>
    <!-- NAVBAR ENDS HERE -->

    <main class="min-h-screen flex items-center justify-center">
      <div class="w-full max-w-md bg-white p-6 rounded-xl shadow-lg">
        <p class="text-center mb-4">Profile Picture Upload</p>

        <img
          id="profileImage"
          src="/images/hike2.jpg"
          alt="Profile Picture"
          class="mx-auto mb-3"
          width="80"
        />

        <input
          type="file"
          id="inputImage"
          accept="image/*"
          class="block mx-auto mb-6"
        />

        <h1 class="text-xl font-semibold text-center mb-4">User Profile</h1>

        <form>
          <fieldset id="personalInfoFields" disabled class="space-y-3">
            <div>
              <label>Name</label>
              <input
                type="text"
                id="nameInput"
                class="w-full border p-2 rounded"
              />
            </div>

            <div>
              <label>School</label>
              <input
                type="text"
                id="schoolInput"
                class="w-full border p-2 rounded"
              />
            </div>

            <div>
              <label>City</label>
              <input
                type="text"
                id="cityInput"
                class="w-full border p-2 rounded"
              />
            </div>
          </fieldset>

          <div class="mt-4 flex justify-center gap-3">
            <button class="text-blue-500" id="editButton" type="button">
              Edit
            </button>
            <button class="text-blue-500" id="saveButton" type="button">
              Save
            </button>
          </div>
          <div class="flex justify-center py-2">
            <a
              class="bg-blue-400 p-2 rounded-xl text-white font-bold"
              href="edititinerary.html"
              >SEE YOUR PLANNER</a
            >
          </div>
        </form>
      </div>
    </main>

    <!-- our own footer goes here -->
    <site-footer></site-footer>
  </body>
</html>
