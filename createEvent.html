<!doctype html>
<html lang="en">
  <head>
    <title>Guidebook Vancouver</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/main.js"></script>
    <script type="module" src="./src/components/sitenavbar.js"></script>
    <script type="module" src="/src/createEvent.js"></script>
    <script type="module" src="./src/components/sitefooter.js"></script>
  </head>

  <body class="min-h-screen flex flex-col bg-gray-100">
    <!-- NAVBAR -->
    <site-navbar></site-navbar>

    <!-- MAIN -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-2xl bg-white shadow-xl rounded-2xl p-8">
        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold text-gray-800">Upload Event</h1>
        </div>

        <div class="space-y-5">
          <div>
            <label
              for="title"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Title
            </label>
            <input
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              type="text"
              id="title"
              placeholder="My Event"
            />
          </div>

          <div>
            <label
              for="time"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Time
            </label>
            <input
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              type="datetime-local"
              id="time"
            />
          </div>

          <div>
            <label
              for="type"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Type
            </label>
            <input
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              type="text"
              id="type"
              placeholder="Party"
            />
          </div>

          <div>
            <label
              for="address"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Address
            </label>
            <input
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              type="text"
              id="address"
              placeholder="3700 Willingdon Ave"
            />
          </div>

          <div>
            <label
              for="postalCode"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Postal Code
            </label>
            <input
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"
              type="text"
              id="postalCode"
              placeholder="V5G 3H2"
            />
          </div>

          <div>
            <label
              for="description"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Description
            </label>
            <textarea
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 min-h-[120px]"
              id="description"
              placeholder="Write a short description of the event..."
            ></textarea>
          </div>

          <div>
            <label
              for="prevImg"
              class="block text-sm font-medium text-gray-700 mb-1"
            >
              Preview Image
            </label>
            <input
              class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-teal-500 file:text-white hover:file:bg-teal-600"
              type="file"
              id="prevImg"
            />
          </div>

          <div class="pt-2">
            <button
              class="w-full bg-teal-500 hover:bg-teal-600 text-white font-medium py-3 rounded-lg transition"
              id="uploadBtn"
            >
              Upload Event
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <site-footer class="mt-auto"></site-footer>
  </body>
</html>
