<!doctype html>
<html lang="en">
  <head>
    <title>Guidebook Vancouver</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <script type="module" src="./src/main.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../src/main.js"></script>
    <script type="module" src="./src/components/sitenavbar.js"></script>
    <script type="module" src="/src/createEvent.js"></script>
    <script type="module" src="./src/components/sitefooter.js"></script>
  </head>

  <body>
    <!-- NAVBAR STARTS HERE -->
    <site-navbar></site-navbar>
    <!-- NAVBAR ENDS HERE -->

    <main class="flex justify-center mx-auto m-10 mt-20 mb-80">
        <div class="">
            <h1 class="font-semibold text-2xl">Upload Event</h1>
            <div class="flex gap-2">
                <label> Title </label>
                <input class="px-2 py-1" type="text" id="title" placeholder="My Event">
            </div>
<div class="flex gap-2 items-center">
  <label>Time</label>
  <input
    class="px-2 py-1 border rounded"
    type="datetime-local"
    id="time"
  >
</div>
            <div class="flex gap-2">
                <label> Type </label>
                <input class="px-2 py-1" type="text" id="type" placeholder="Party">
            </div>
            <div class="flex gap-2">
                <label> Address </label>
                <input class="px-2 py-1" type="text" id="address" placeholder="3700 Willington Ave">
            </div>
            <div class="flex gap-2">
                <label> Postal code </label>
                <input class="px-2 py-1" type="text" id="postalCode" placeholder="V5G 3H2">
            </div>
            <div class="">
                <label> Description </label>
                <br>
  <textarea
  class="px-3 py-2 border border-gray-300 rounded-lg w-full"
  id="description"
></textarea>
                
            </div>
            <div>
                <label>Preview image</label>
                <input type="file" id="prevImg">
            </div>
            <button class="rounded-lg bg-slate-400 px-4 py-1" id="uploadBtn">
                    Upload
                </button>
        </div>
      </div>
    </main>

    <!-- FOOTER BEGINS HERE -->
    <site-footer></site-footer>
    <!-- FOOTER ENDS HERE -->
  </body>
</html>
