<!doctype html>
<html lang="en">
  <head>
    <title>Guidebook Vancouver</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module" src="./src/eventGeneric.js"></script>
    <script type="module" src="./src/components/sitenavbar.js"></script>
    <script type="module" src="./src/components/sitefooter.js"></script>
  </head>

  <body class="min-h-screen flex flex-col bg-gray-50">
    <site-navbar></site-navbar>

    <main class="flex-1 px-4 p-24 md:px-8">
      <section class="max-w-6xl mx-auto">
        <div
          id="mainEventPage"
          class="bg-white rounded-2xl shadow border border-gray-200 overflow-hidden"
        >
          <div class="flex flex-col md:flex-row">
            <div class="w-full md:w-1/2">
              <img
                id="eventImage"
                src=""
                alt="Event image"
                class="w-full h-64 sm:h-80 md:h-full object-contain bg-gray-100"
              />
            </div>

            <div
              class="w-full md:w-1/2 p-5 md:p-8 flex flex-col justify-between"
            >
              <div>
                <p
                  class="text-sm font-semibold text-[#00C7A9] uppercase tracking-wide mb-2"
                >
                  Vancouver Event
                </p>

                <h1
                  id="eventName"
                  class="text-2xl md:text-4xl font-bold text-gray-800 mb-4"
                >
                  Event Title
                </h1>

                <p id="eventDate" class="text-gray-500 mb-2"></p>

                <p
                  id="eventAddress"
                  class="text-gray-500 text-sm md:text-base mb-4"
                ></p>

                <p
                  id="eventDescription"
                  class="text-gray-700 leading-7 text-base md:text-lg"
                ></p>
              </div>

              <div class="flex flex-col sm:flex-row gap-3 mt-8">
                <button
                  id="addBtn"
                  class="bg-[#00C7A9] hover:bg-[#00b39a] rounded-lg px-5 py-3 text-white font-semibold transition w-full sm:w-auto"
                >
                  Add to Itinerary
                </button>

                <a
                  id="mapBtn"
                  href="#"
                  class="border border-[#00C7A9] text-[#00C7A9] hover:bg-gray-50 rounded-lg px-5 py-3 font-semibold transition text-center w-full sm:w-auto"
                >
                  View on Map
                </a>
              </div>
            </div>
          </div>
        </div>

        <div id="nearbyEvents" class="mt-8"></div>
      </section>
    </main>

    <site-footer></site-footer>
  </body>
</html>
